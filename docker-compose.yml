services:
  database:
    container_name: database
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:${DB_CONTAINER_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    container_name: server
    image: workstackhub/server-development
    build:
      context: ./server
      dockerfile: Dockerfile
      target: development
    ports:
      - "${SERVER_PORT}:${SERVER_CONTAINER_PORT}"
    env_file:
      - ./server/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
      # This OVERRIDES any DATABASE_URL from server/.env
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@database:${DB_CONTAINER_PORT}/${DB_NAME}?schema=public
      - SERVER_PORT=${SERVER_PORT}
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./server:/workstackhub/server
      - /workstackhub/server/node_modules

  client:
    container_name: client
    image: workstackhub/client-development
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "${CLIENT_PORT}:${CLIENT_CONTAINER_PORT}"
    volumes:
      - ./client:/workstackhub/client
      - /workstackhub/client/node_modules

volumes:
  postgres_data:
    driver: local